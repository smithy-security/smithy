---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: producer-snyk-node
  labels:
    v1.smithy.smithy-security.com/component: producer
    v1.smithy.smithy-security.com/test-type: sast
    v1.smithy.smithy-security.com/language: docpythoner
spec:
  params:
  - name: producer-snyk-node-api-key
    type: string
  - name: producer-snyk-node-directories
    type: array
    default:
    - .
  description: Run Snyk For Javascript, Typescript, Node
  volumes:
    - name: scratch
      emptyDir: {}
  workspaces:
    - name: output
      description: The workspace containing the source-code to scan.
  steps:
  - name: run-snyk
    imagePullPolicy: IfNotPresent
    env:
      - name: SNYK_INTEGRATION_VERSION 
        value: docker
    image: snyk/snyk:node
    script: |
      #!/usr/bin/env bash
      set -x

      echo "authenticating to snyk"
      snyk auth $(params.producer-snyk-node-api-key)

      source_code=$(workspaces.output.path)/source-code/
      subdirs=( $(params.producer-snyk-node-directories[*]) )
      counter=0

      for subdir in "${subdirs[@]}"
      do

        case "x${subdir}" in
        (x/*|x*/..|x*/../*|x../*)
          echo "you should not have upper links in your subdirectories: ${subdir}"
          ;;
        esac

        # cleanup subdirectories from .
        absolute_subdir=$(cd ${subdir}; pwd)
        subdir=${absolute_dir#${source_code}}

        cd $(workspaces.output.path)/source-code/${subdir}

        if [ -e yarn.lock ]
        then
          yarn install
        else
          npm install
        fi

        set +e
        echo "running snyk test on directory $(pwd)"
        snyk test --prune-repeated-subdependencies --skip-unresolved --sarif-file-output=/scratch/snyk-${counter}.out .
        exitCode=$?
        if [[ $exitCode -ne 0 && $exitCode -ne 1 ]]; then
          echo "Snyk failed with exit code $exitCode"
          exit $exitCode
        else
          echo "Snyk completed successfully for $(pwd)"
          echo "${subdir} /scratch/snyk-${counter}.out" >> /scratch/snyk-index
        fi
        set -e
      done
    volumeMounts:
    - mountPath: /scratch
      name: scratch

  - name: produce-issues
    imagePullPolicy: IfNotPresent
    image: '{{ default "ghcr.io/smithy-security/smithy" .Values.image.registry }}/components/producers/snyk-docker:{{ .Chart.AppVersion }}'
    command: ["/app/components/producers/snyk-docker/snyk-docker-parser"]
    args:
    - "-in=/scratch/snyk.out"
    - "-out=$(workspaces.output.path)/.smithy/producers/snyk.pb"
    - "-language=javascript"
    volumeMounts:
    - mountPath: /scratch
      name: scratch
