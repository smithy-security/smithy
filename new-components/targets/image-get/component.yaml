name: git-clone
description: "Clones a repository"
type: target
parameters:
  - name: image
    type: string
    value: ""
  - name: username
    type: string
    value: ""
  - name: password
    type: string
    value: ""
  - name: registry
    type: string
    value: "docker.io"
steps:
  - name: clone-repo
    env_vars:
      GIT_CLONE_REPO_URL: "{{ .parameters.repo_url }}"
      GIT_CLONE_REFERENCE: "{{ .parameters.reference }}"
      GIT_CLONE_PATH: "{{ sourceCodeWorkspace }}"
    image: new-components/targets/git-clone
    executable: /bin/target
